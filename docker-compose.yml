services:
  ani-rename:
    build: .
    container_name: ani-rename
    ports:
      - "5800:5800"
    volumes:
      # 媒体目录（默认只读，适合先扫描/预览）
      # 需要在 WebUI 执行改名时，设置 MEDIA_VOLUME_MODE=rw 后再启动。
      - ${MEDIA_ROOT:-/mediapath}:/media:${MEDIA_VOLUME_MODE:-ro}
      # API 凭据（放在项目根目录下）
      - ./tmdb-api.txt:/app/tmdb-api.txt:ro
      # AniDB 凭据（可选）
      - ./anidb-auth.txt:/app/anidb-auth.txt:ro
      # AniDB 缓存持久化
      - ./anidb-title-cache:/app/anidb-title-cache
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - ANIDB_USERNAME=${ANIDB_USERNAME:-}
      - ANIDB_PASSWORD=${ANIDB_PASSWORD:-}
    restart: unless-stopped
